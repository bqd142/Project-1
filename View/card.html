<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="Css/navbar.css">
    <link rel="icon" href="Media/logo.png" type="image/x-icon">
</head>
<body>
    <a href="#" style="text-decoration: none;" class="d-flex justify-content-center">
        <div class="card border border-5" style="width:250px">
            <img class="card-img-top" src="Media/banhtrungthu.jpg" alt="Card image">
            <div class="card-body">
                <h5 class="card-title text-center ">Mousse sữa chua cafe</h5>
                <h6 class="text-danger text-center">330.000đ</h6>
                <button type="button" class="btn btn-outline-danger  text-fw-bold" style="width: 150px; margin-left: 25px;">Liên hệ</button>
            </div>
        </div>
    </a>
    
</body>
</html>
